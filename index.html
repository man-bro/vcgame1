<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>점프 타이밍 게임</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="game-wrapper">
    <h1>점프 타이밍 게임</h1>
    <p class="description">스페이스바 또는 화면 클릭으로 점프해서 장애물을 피하세요!</p>

    <section class="score-board">
      <div>점수: <span id="score">0</span></div>
      <div>목표: <span id="targetScore">10</span></div>
    </section>

    <section id="gameArea" class="game-area">
      <div id="player" class="player"></div>
      <div id="obstacle" class="obstacle"></div>
      <div class="ground"></div>
      <div id="message" class="message">
        <strong>게임 시작</strong>
        <span>시작 버튼을 누르세요</span>
      </div>
    </section>

    <section id="rankingPanel" class="ranking-panel">
      <h2>플레이 로그 TOP 10</h2>
      <ol id="rankingList" class="ranking-list"></ol>
      <button id="clearRankingBtn" class="clear-ranking-btn" type="button">랭킹 초기화</button>
    </section>

    <button id="startBtn" class="start-btn">게임 시작</button>
    <p class="tip">조작: 스페이스바 / 마우스 클릭 / 터치</p>
  </main>

  <script src="script.js"></script>
</body>
</html>
